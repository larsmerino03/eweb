<!DOCTYPE html>
<html lang="de-CH">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Desktop</title>

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="desktop" role="application" aria-label="Portfolio Desktop">
      <!-- DESKTOP ICONS (frei positioniert via CSS Klassen) -->
      <button
        class="desktop-icon icon-ueber"
        type="button"
        data-open="win-ueber"
      >
        <img class="icon-img" src="assets/images/ueber_mich.png" alt="" />
        <span class="icon-label">ÜBER MICH</span>
      </button>

      <button
        class="desktop-icon icon-workouts"
        type="button"
        data-open="win-workouts"
      >
        <img class="icon-img" src="assets/images/workout.png" alt="" />
        <span class="icon-label">WORKOUTS</span>
      </button>

      <button
        class="desktop-icon icon-highlights"
        type="button"
        data-open="win-highlights"
      >
        <img class="icon-img" src="assets/images/highlights.png" alt="" />
        <span class="icon-label">HIGHLIGHTS</span>
      </button>

      <button
        class="desktop-icon icon-ausruestung"
        type="button"
        data-open="win-ausruestung"
      >
        <img class="icon-img" src="assets/images/ausruestung.png" alt="" />
        <span class="icon-label">AUSRÜSTUNG</span>
      </button>

      <button
        class="desktop-icon icon-playlist"
        type="button"
        data-open="win-playlist"
      >
        <img class="icon-img" src="assets/images/playlist.png" alt="" />
        <span class="icon-label">PLAYLIST</span>
      </button>

      <!-- WINDOWS LAYER -->
      <div class="windows" aria-label="Fenster Ebene">
        <!-- ÜBER MICH -->
        <section class="window" id="win-ueber" aria-hidden="true">
          <header class="win-topbar">
            <div class="win-title-left">
              <span class="win-app-icon" aria-hidden="true"></span>
              <h2 class="win-title">ÜBER MICH</h2>
            </div>
            <button
              class="win-close"
              type="button"
              data-close
              aria-label="Fenster schliessen"
            >
              ✕
            </button>
          </header>

          <nav class="win-menubar" aria-label="Menü">
            <button type="button" class="win-menuitem">DATEI</button>
            <button type="button" class="win-menuitem">BEARBEITEN</button>
            <button type="button" class="win-menuitem">ANSICHT</button>
            <button type="button" class="win-menuitem">ZU</button>
            <button type="button" class="win-menuitem">HILFE</button>
          </nav>

          <div class="win-body">
            <iframe
              class="win-iframe"
              src="ueber_mich.html"
              title="Über mich"
            ></iframe>
          </div>
        </section>

        <!-- WORKOUTS -->
        <section class="window" id="win-workouts" aria-hidden="true">
          <header class="win-topbar">
            <div class="win-title-left">
              <span class="win-app-icon" aria-hidden="true"></span>
              <h2 class="win-title">WORKOUTS</h2>
            </div>
            <button
              class="win-close"
              type="button"
              data-close
              aria-label="Fenster schliessen"
            >
              ✕
            </button>
          </header>

          <nav class="win-menubar" aria-label="Menü">
            <button type="button" class="win-menuitem">DATEI</button>
            <button type="button" class="win-menuitem">BEARBEITEN</button>
            <button type="button" class="win-menuitem">ANSICHT</button>
            <button type="button" class="win-menuitem">ZU</button>
            <button type="button" class="win-menuitem">HILFE</button>
          </nav>

          <div class="win-body">
            <iframe
              class="win-iframe"
              src="meine_workouts.html"
              title="Workouts"
            ></iframe>
          </div>
        </section>

        <!-- HIGHLIGHTS -->
        <section class="window" id="win-highlights" aria-hidden="true">
          <header class="win-topbar">
            <div class="win-title-left">
              <span class="win-app-icon" aria-hidden="true"></span>
              <h2 class="win-title">HIGHLIGHTS</h2>
            </div>
            <button
              class="win-close"
              type="button"
              data-close
              aria-label="Fenster schliessen"
            >
              ✕
            </button>
          </header>

          <nav class="win-menubar" aria-label="Menü">
            <button type="button" class="win-menuitem">DATEI</button>
            <button type="button" class="win-menuitem">BEARBEITEN</button>
            <button type="button" class="win-menuitem">ANSICHT</button>
            <button type="button" class="win-menuitem">ZU</button>
            <button type="button" class="win-menuitem">HILFE</button>
          </nav>

          <div class="win-body">
            <iframe
              class="win-iframe"
              src="highlights.html"
              title="Highlights"
            ></iframe>
          </div>
        </section>

        <!-- AUSRÜSTUNG -->
        <section class="window" id="win-ausruestung" aria-hidden="true">
          <header class="win-topbar">
            <div class="win-title-left">
              <span class="win-app-icon" aria-hidden="true"></span>
              <h2 class="win-title">AUSRÜSTUNG</h2>
            </div>
            <button
              class="win-close"
              type="button"
              data-close
              aria-label="Fenster schliessen"
            >
              ✕
            </button>
          </header>

          <nav class="win-menubar" aria-label="Menü">
            <button type="button" class="win-menuitem">DATEI</button>
            <button type="button" class="win-menuitem">BEARBEITEN</button>
            <button type="button" class="win-menuitem">ANSICHT</button>
            <button type="button" class="win-menuitem">ZU</button>
            <button type="button" class="win-menuitem">HILFE</button>
          </nav>

          <div class="win-body win-body--tabs">
            <div class="win-tabs" aria-label="Ausrüstung Tabs">
              <button
                type="button"
                class="win-tab"
                data-iframe-src="ausruestung/gravel.html"
              >
                Gravel
              </button>
              <button
                type="button"
                class="win-tab"
                data-iframe-src="ausruestung/padel.html"
              >
                Padel
              </button>
            </div>

            <iframe
              id="iframe-ausruestung"
              class="win-iframe"
              src="ausruestung/gravel.html"
              title="Ausrüstung"
            ></iframe>
          </div>
        </section>

        <!-- PLAYLIST -->
        <section class="window" id="win-playlist" aria-hidden="true">
          <header class="win-topbar">
            <div class="win-title-left">
              <span class="win-app-icon" aria-hidden="true"></span>
              <h2 class="win-title">PLAYLIST</h2>
            </div>
            <button
              class="win-close"
              type="button"
              data-close
              aria-label="Fenster schliessen"
            >
              ✕
            </button>
          </header>

          <nav class="win-menubar" aria-label="Menü">
            <button type="button" class="win-menuitem">DATEI</button>
            <button type="button" class="win-menuitem">BEARBEITEN</button>
            <button type="button" class="win-menuitem">ANSICHT</button>
            <button type="button" class="win-menuitem">ZU</button>
            <button type="button" class="win-menuitem">HILFE</button>
          </nav>

          <div class="win-body">
            <iframe
              class="win-iframe"
              src="musik.html"
              title="Playlist"
            ></iframe>
          </div>
        </section>
      </div>

      <!-- TASKBAR -->
      <footer class="taskbar" aria-label="Taskbar">
        <div class="taskbar-left">
          <!-- Setze hier deine echte Insta-URL -->
          <a
            class="taskbar-btn"
            href="https://www.instagram.com/larsmerino"
            target="_blank"
            rel="noopener"
          >
            INSTAGRAM
          </a>
        </div>

        <div class="taskbar-right">
          <div class="taskbar-clock" id="clock">--:--</div>
        </div>
      </footer>
    </div>

    <script>
      // Fenster öffnen
      document.querySelectorAll("[data-open]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-open");
          const win = document.getElementById(id);
          if (!win) return;

          win.classList.add("is-open");
          win.setAttribute("aria-hidden", "false");
        });
      });

      // Fenster schliessen
      document.querySelectorAll("[data-close]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const win = btn.closest(".window");
          if (!win) return;

          win.classList.remove("is-open");
          win.setAttribute("aria-hidden", "true");
        });
      });

      // Tabs für Ausrüstung: iframe wechseln
      document.querySelectorAll(".win-tab[data-iframe-src]").forEach((tab) => {
        tab.addEventListener("click", () => {
          const src = tab.getAttribute("data-iframe-src");
          const iframe = document.getElementById("iframe-ausruestung");
          if (iframe && src) iframe.src = src;
        });
      });

      // Uhr unten rechts (24h)
      function updateClock() {
        const el = document.getElementById("clock");
        if (!el) return;
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        el.textContent = `${hh}:${mm}`;
      }
      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
