<!DOCTYPE html>
<html lang="de-CH">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Meine Workouts</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial,
          sans-serif;
        background: #fff;
      }
      .filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
        align-items: center;
      }
      select,
      input,
      button {
        padding: 8px 10px;
        border: 2px solid #111;
        background: #f3f3f3;
        font-weight: 900;
      }
      button {
        cursor: pointer;
      }
      .stats {
        margin: 8px 0 14px;
        font-weight: 900;
        font-family: ui-monospace, Menlo, Consolas, monospace;
      }
      .status {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-weight: 800;
        opacity: 0.8;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }
      li {
        border: 2px solid #111;
        padding: 10px 12px;
        background: #fafafa;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }
      .name {
        font-weight: 900;
      }
      .badge {
        display: inline-block;
        border: 2px solid #111;
        padding: 2px 8px;
        margin-right: 8px;
        background: #eaeaea;
        font-size: 12px;
        font-weight: 900;
      }
      .meta {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 4px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div class="filters">
      <select id="type">
        <option value="">ALLE</option>
        <option value="Ride">RIDE</option>
        <option value="Run">RUN</option>
        <option value="Workout">WORKOUT</option>
        <option value="Hike">HIKE</option>
        <option value="Walk">WALK</option>
      </select>

      <select id="days">
        <option value="7">7 TAGE</option>
        <option value="30" selected>30 TAGE</option>
        <option value="90">90 TAGE</option>
        <option value="365">1 JAHR</option>
      </select>

      <input id="q" placeholder="SUCHE..." />
      <button id="reload" type="button">LADEN</button>
      <span class="status" id="status"></span>
    </div>

    <div class="stats" id="stats">—</div>

    <ul id="list">
      <li>LADE…</li>
    </ul>

    <script>
      const list = document.getElementById("list");
      const stats = document.getElementById("stats");
      const statusEl = document.getElementById("status");

      const km = (m) => ((m || 0) / 1000).toFixed(1);
      const mins = (s) => Math.round((s || 0) / 60);

      function render(items) {
        list.innerHTML = "";

        if (!Array.isArray(items) || items.length === 0) {
          list.innerHTML = "<li>Keine Aktivitäten gefunden.</li>";
          stats.textContent = "0 Aktivitäten";
          return;
        }

        let totalDist = 0;
        let totalTime = 0;
        let totalElev = 0;

        for (const a of items) {
          const dist = a.distance || 0;
          const time = a.moving_time || 0;
          const elev = a.total_elevation_gain || 0;

          totalDist += dist;
          totalTime += time;
          totalElev += elev;

          const date = new Date(
            a.start_date_local || a.start_date
          ).toLocaleDateString("de-CH");

          const li = document.createElement("li");
          li.innerHTML = `
        <div class="row">
          <div class="name">
            <span class="badge">${a.type || "-"}</span>
            ${a.name || "Aktivität"}
          </div>
          <div>${km(dist)} km</div>
        </div>
        <div class="meta">
          ${date} • ${km(dist)} km • ${Math.round(elev)} hm • ${mins(time)} min
        </div>
      `;
          list.appendChild(li);
        }

        stats.textContent = `${items.length} Aktivitäten • ${km(
          totalDist
        )} km • ${Math.round(totalElev)} hm • ${mins(totalTime)} min`;
      }

      async function loadActivities() {
        const type = document.getElementById("type").value;
        const days = document.getElementById("days").value;
        const q = document.getElementById("q").value;

        const url = new URL("/api/activities", window.location.origin);
        if (type) url.searchParams.set("type", type);
        if (days) url.searchParams.set("days", days);
        if (q) url.searchParams.set("q", q);

        statusEl.textContent = "lädt…";
        list.innerHTML = "<li>LADE…</li>";

        try {
          const res = await fetch(url, { cache: "no-store" });

          // Debug: falls Server HTML/Fehler liefert
          const contentType = res.headers.get("content-type") || "";
          const text = await res.text();

          if (!res.ok) {
            statusEl.textContent = "";
            list.innerHTML = `<li>FEHLER (${res.status}): ${text}</li>`;
            return;
          }

          if (!contentType.includes("application/json")) {
            statusEl.textContent = "";
            list.innerHTML = `<li>FEHLER: Erwartete JSON Antwort, bekam: ${contentType}<br><br>${text}</li>`;
            return;
          }

          const data = JSON.parse(text);
          render(data);
          statusEl.textContent = "";
        } catch (e) {
          statusEl.textContent = "";
          list.innerHTML = `<li>FEHLER: ${e.message}</li>`;
        }
      }

      document
        .getElementById("reload")
        .addEventListener("click", loadActivities);
      document
        .getElementById("type")
        .addEventListener("change", loadActivities);
      document
        .getElementById("days")
        .addEventListener("change", loadActivities);
      document.getElementById("q").addEventListener("input", () => {
        clearTimeout(window.__t);
        window.__t = setTimeout(loadActivities, 250);
      });

      loadActivities();
    </script>
  </body>
</html>
