<!DOCTYPE html>
<html lang="de-CH">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playlist</title>
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>

  <body>
    <main class="app">
      <h1>Playlist</h1>
      <p class="sub">
        Platzhalter: hier kommt später Apple Music / Spotify rein
      </p>

      <section class="panel">
        <h2>Platzhalter</h2>
        <p class="muted">
          Du kannst später ein Embedded Widget einbinden oder deine
          Lieblingssongs als Liste anzeigen.
        </p>
        <ul class="list">
          <li>Song/Artist 1: (Platzhalter)</li>
          <li>Song/Artist 2: (Platzhalter)</li>
          <li>Song/Artist 3: (Platzhalter)</li>
        </ul>
      </section>
    </main>
  </body>
</html>
